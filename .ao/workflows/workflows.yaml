default_workflow_ref: generate-example

workflows:
  # Generate a single example repo from a registry entry
  - id: generate-example
    name: "Generate Example"
    description: "Creates a complete AO example repo for a given vertical"
    phases:
      - plan-example
      - scaffold-example
      - build-example
      - review-example:
          on_verdict:
            rework:
              target: build-example
            fail:
              target: plan-example
            advance:
              target: init-example-repo
          max_rework_attempts: 3
      - init-example-repo
      - update-registry
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: true
        auto_merge: false
        cleanup_worktree: true

  # Batch generate all pending examples
  - id: generate-all
    name: "Generate All Pending Examples"
    description: "Picks the next pending example from registry and generates it"
    phases:
      - pick-next-example

  # Refresh an existing example to latest AO schema
  - id: refresh-example
    name: "Refresh Example"
    description: "Updates an existing example to use latest AO features and schema"
    phases:
      - audit-example:
          on_verdict:
            advance:
              target: ""
            rework:
              target: refresh-example-phase
      - refresh-example-phase:
          id: refresh-example-phase
          mode: agent
          agent: example-builder
          directive: "Update the example based on audit findings"
      - review-example:
          on_verdict:
            rework:
              target: refresh-example-phase
            advance:
              target: ""
          max_rework_attempts: 2
