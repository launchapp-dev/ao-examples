default_workflow_ref: generate-workflow

workflows:
  # ============================================================
  # CONDUCTOR LOOP — runs every 30 min, fully autopilot
  # ============================================================
  - id: conductor-loop
    name: "Conductor Loop"
    description: "Master conductor sweep — ideates, researches, queues, manages the entire factory"
    phases:
      - conductor-sweep

  # ============================================================
  # WORKFLOW GENERATION — queued by conductor
  # ============================================================
  - id: generate-workflow
    name: "Generate Workflow"
    description: "Full pipeline: plan → scaffold → build → review → QA → init repo → update registry"
    phases:
      - plan-workflow
      - scaffold-workflow
      - build-workflow
      - review-workflow:
          on_verdict:
            rework:
              target: build-workflow
            fail:
              target: plan-workflow
            advance:
              target: qa-workflow
          max_rework_attempts: 3
      - qa-workflow:
          on_verdict:
            rework:
              target: build-workflow
            fail:
              target: build-workflow
          max_rework_attempts: 3
      - init-workflow-repo
      - update-registry
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: true
        auto_merge: true
        cleanup_worktree: true

  # ============================================================
  # IDEATION — when the pipeline needs more ideas
  # ============================================================
  - id: ideation
    name: "Ideation Pipeline"
    description: "Brainstorm and research new workflow ideas, add to registry"
    phases:
      - ideate

  # ============================================================
  # RESEARCH — deep dive on a specific tool/integration
  # ============================================================
  - id: research
    name: "Research Integration"
    description: "Deep-dive research on a tool, API, or MCP server for a proposed workflow"
    phases:
      - research-integration

  # ============================================================
  # MCP SERVER BUILD — conductor queues these when no MCP exists
  # ============================================================
  - id: build-mcp
    name: "Build Custom MCP Server"
    description: "Research API, build MCP server, review, publish to GitHub"
    phases:
      - research-mcp
      - build-mcp
      - review-mcp:
          on_verdict:
            rework:
              target: build-mcp
            fail:
              target: research-mcp
          max_rework_attempts: 3
      - publish-mcp
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: true
        auto_merge: true
        cleanup_worktree: true

  # ============================================================
  # QA — validate workflows actually work
  # ============================================================
  - id: qa-single
    name: "QA Single Workflow"
    description: "Run full QA on a single workflow, fix if broken"
    phases:
      - qa-workflow:
          on_verdict:
            rework:
              target: fix-workflow
            fail:
              target: fix-workflow
      - fix-workflow
      - qa-workflow:
          max_rework_attempts: 2

  - id: qa-all
    name: "QA All Workflows"
    description: "Run full QA suite on all generated workflows"
    phases:
      - qa-all-workflows

  - id: qa-and-fix
    name: "QA and Fix Workflow"
    description: "QA a workflow, fix if broken, retest"
    phases:
      - qa-workflow:
          on_verdict:
            rework:
              target: fix-workflow
            fail:
              target: fix-workflow
      - fix-workflow
      - qa-workflow:
          on_verdict:
            rework:
              target: fix-workflow
          max_rework_attempts: 3

  - id: qa-mcp
    name: "QA MCP Server"
    description: "Run test suite on a custom MCP server"
    phases:
      - qa-mcp-server

  # ============================================================
  # MAINTENANCE — audit and refresh existing workflows
  # ============================================================
  - id: audit
    name: "Audit Workflows"
    description: "Review all generated workflows for quality and freshness"
    phases:
      - audit-workflows

  - id: refresh
    name: "Refresh Workflow"
    description: "Update an existing workflow to latest AO features"
    phases:
      - refresh-workflow
      - review-workflow:
          on_verdict:
            rework:
              target: refresh-workflow
          max_rework_attempts: 2
