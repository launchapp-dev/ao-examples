default_workflow_ref: generate-example

workflows:
  # ============================================================
  # CONDUCTOR LOOP — runs every 30 min, fully autopilot
  # ============================================================
  - id: conductor-loop
    name: "Conductor Loop"
    description: "Master conductor sweep — ideates, researches, queues, manages the entire factory"
    phases:
      - conductor-sweep

  # ============================================================
  # EXAMPLE GENERATION — queued by conductor
  # ============================================================
  - id: generate-example
    name: "Generate Example"
    description: "Full pipeline: plan → scaffold → build → review → init repo → update registry"
    phases:
      - plan-example
      - scaffold-example
      - build-example
      - review-example:
          on_verdict:
            rework:
              target: build-example
            fail:
              target: plan-example
            advance:
              target: init-example-repo
          max_rework_attempts: 3
      - init-example-repo
      - update-registry
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: true
        auto_merge: true
        cleanup_worktree: true

  # ============================================================
  # IDEATION — when the pipeline needs more ideas
  # ============================================================
  - id: ideation
    name: "Ideation Pipeline"
    description: "Brainstorm and research new example ideas, add to registry"
    phases:
      - ideate

  # ============================================================
  # RESEARCH — deep dive on a specific tool/integration
  # ============================================================
  - id: research
    name: "Research Integration"
    description: "Deep-dive research on a tool, API, or MCP server for a proposed example"
    phases:
      - research-integration

  # ============================================================
  # MCP SERVER BUILD — conductor queues these when no MCP exists
  # ============================================================
  - id: build-mcp
    name: "Build Custom MCP Server"
    description: "Research API, build MCP server, review, publish to GitHub"
    phases:
      - research-mcp
      - build-mcp
      - review-mcp:
          on_verdict:
            rework:
              target: build-mcp
            fail:
              target: research-mcp
          max_rework_attempts: 3
      - publish-mcp
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: true
        auto_merge: true
        cleanup_worktree: true

  # ============================================================
  # MAINTENANCE — audit and refresh existing examples
  # ============================================================
  - id: audit
    name: "Audit Examples"
    description: "Review all generated examples for quality and freshness"
    phases:
      - audit-examples

  - id: refresh
    name: "Refresh Example"
    description: "Update an existing example to latest AO features"
    phases:
      - refresh-example
      - review-example:
          on_verdict:
            rework:
              target: refresh-example
          max_rework_attempts: 2
