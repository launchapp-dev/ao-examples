phases:
  # ============================================================
  # CONDUCTOR PHASES — runs every 30 min
  # ============================================================

  conductor-sweep:
    mode: agent
    agent: conductor
    directive: |
      Run your 30-minute sweep. This is your main loop.

      ## Project Layout
      You are in /Users/samishukri/ao-examples (the project root).
      - registry.yaml        — master list of all examples and their status
      - examples/             — each subdirectory is a standalone AO example repo
      - examples/<id>/        — one example (e.g. examples/blog-generator/)
      - examples/<id>/.ao/workflows/ — the AO config for that example
      - research/             — research briefs written by the researcher agent

      ## Your Loop
      1. Read registry.yaml — check current state of all examples
      2. List the examples/ directory — what actually exists on disk?
      3. Run `ao task list` — any tasks running, stuck, or completed?
      4. Handle completed tasks: update registry status to "generated"
      5. Handle stuck/failed tasks: investigate, re-queue if needed
      6. **VERIFY GITHUB REPOS** — for every example with status "generated":
         a. Check if the remote repo exists: `gh repo view launchapp-dev/ao-example-<id> 2>&1`
         b. If it doesn't exist, create it:
            `cd examples/<id> && gh repo create launchapp-dev/ao-example-<id> --public --description "AO workflow example: <id>" --source=. --push`
         c. If it exists but local is ahead of remote, push:
            `cd examples/<id> && git push`
         d. Verify the repo is public: `gh repo view launchapp-dev/ao-example-<id> --json visibility -q '.visibility'`
            If private, make it public: `gh repo edit launchapp-dev/ao-example-<id> --visibility public`
      7. Count how many tasks are currently queued/in-progress
      8. If < 3 active tasks AND queued examples exist: enqueue top 1-2 using:
           ao queue enqueue --title "<example-id>" --description "<description from registry>" --workflow-ref generate-example
      9. If all existing examples are generated or in-progress: IDEATE
         - Come up with 2-3 new example ideas
         - Research what tools/MCP servers they'd need
         - Add them to registry.yaml with status: "queued"
         - Enqueue the highest-priority new idea
      10. Update README.md examples table if any new examples were completed
      11. Commit and push changes

      IMPORTANT: The task title MUST be the example id (e.g. "blog-generator").
      This is how downstream phases know which directory to work in.
      The example id becomes the directory name under examples/.

      IMPORTANT: Use `ao queue enqueue` to queue work, NOT `ao task create`.

      Be creative with ideas. Think about:
      - Replicate integration (image gen, video gen, audio)
      - Financial tools (stock APIs, crypto, portfolio management)
      - Developer tools (GitHub automation, CI/CD, dependency updates)
      - Content tools (social media, newsletter, SEO)
      - Science tools (paper search, data analysis, visualization)
      - Business tools (CRM, invoicing, reporting)
      - Creative tools (music, art, writing, game design)
      - Education tools (curriculum, quiz generation, tutoring)
      - Healthcare (patient notes, drug interactions, scheduling)
      - Real estate (listing analysis, market reports, property management)
    capabilities:
      mutates_state: true
      writes_files: true
      requires_commit: true

  # ============================================================
  # RESEARCH PHASES — conductor delegates research
  # ============================================================

  research-tools:
    mode: agent
    agent: researcher
    directive: |
      The conductor has asked you to research tools and integrations for a new example idea.

      Read the task title and description for what to research. Investigate:
      1. Does an MCP server exist for this tool? (check npm, GitHub)
      2. What APIs are available? Are they free/paid?
      3. What would the AO workflow look like?
      4. Is this feasible as a standalone example?

      Write your findings to research/<topic>.md in the project root.
      Project root: /Users/samishukri/ao-examples
    capabilities:
      mutates_state: true
      writes_files: true

  # ============================================================
  # EXAMPLE GENERATION PIPELINE
  #
  # Convention: the TASK TITLE is the example id (e.g. "blog-generator").
  # This maps directly to the directory: examples/<task-title>/
  # All phases in this pipeline use this convention.
  # ============================================================

  plan-example:
    mode: agent
    agent: conductor
    directive: |
      You're planning a specific example repo.

      ## How to find the example id
      The task title IS the example id. Look at the current task's title.
      This maps to the directory: examples/<task-title>/

      ## What to do
      1. Read registry.yaml — find the entry matching the task title for this example's spec
      2. Design the complete example:
         - Agent roles — who does what, which model (use variety)
         - Phase pipeline — what steps, what order
         - Workflow routing — rework loops, decision points, approval gates
         - MCP servers needed (only use ones declared: filesystem, github, sequential-thinking)
         - Supporting files needed (config, templates, sample data)
         - README outline
      3. Create the directory: examples/<task-title>/.ao/workflows/
      4. Write the plan to: examples/<task-title>/PLAN.md

      ## File paths (example for task title "blog-generator")
      - examples/blog-generator/PLAN.md
      - examples/blog-generator/.ao/workflows/  (create this directory)

      Project root: /Users/samishukri/ao-examples
    capabilities:
      mutates_state: true
      writes_files: true
      requires_commit: true

  scaffold-example:
    mode: command
    directive: "Create the directory structure for the new example repo"
    command:
      program: bash
      args:
        - "-c"
        - |
          EXAMPLE_ID="{{subject_title}}"
          EXAMPLE_DIR="examples/${EXAMPLE_ID}"
          mkdir -p "${EXAMPLE_DIR}/.ao/workflows"
          mkdir -p "${EXAMPLE_DIR}/output"
          echo "Scaffolded ${EXAMPLE_DIR}"
          ls -la "${EXAMPLE_DIR}"
      cwd_mode: project_root
      timeout_secs: 30

  build-example:
    mode: agent
    agent: master-builder
    directive: |
      Build a complete, runnable AO example repo.

      ## How to find the example id and directory
      The task title IS the example id (e.g. "blog-generator").
      All files go under: examples/<task-title>/
      Example: if task title is "blog-generator", write files to examples/blog-generator/

      ## What to read first
      1. Check if examples/<task-title>/PLAN.md exists — if so, follow the plan
      2. If no plan, read registry.yaml and find the entry matching the task title
      3. Use the description and features_demonstrated fields to guide your build

      ## Files to create (ALL required)

      examples/<task-title>/.ao/workflows/agents.yaml
        - Define all agent profiles with detailed system prompts (5+ lines each)
        - Use real model names: claude-sonnet-4-6, claude-haiku-4-5, claude-opus-4-6, kimi-code/kimi-for-coding, minimax/MiniMax-M2.7
        - Use at least 2 different models
        - Only reference MCP servers that are declared in the mcp-servers.yaml you create

      examples/<task-title>/.ao/workflows/phases.yaml
        - Define all phases referenced by workflows
        - Mix agent phases, command phases, and manual gates where appropriate
        - Include real, detailed directives

      examples/<task-title>/.ao/workflows/workflows.yaml
        - Define at least one workflow pipeline
        - Include at least one non-linear feature (rework loop, decision routing, manual gate)
        - Set default_workflow_ref

      examples/<task-title>/.ao/workflows/mcp-servers.yaml
        - Declare ALL MCP servers referenced by agents
        - Use real npm packages (e.g. @modelcontextprotocol/server-filesystem)

      examples/<task-title>/.ao/workflows/schedules.yaml (ONLY if this example uses cron)

      examples/<task-title>/README.md
        - One-line description
        - Workflow diagram (ASCII)
        - Quick start: cd examples/<task-title> && ao daemon start
        - List of agents and their roles
        - AO features demonstrated
        - Requirements (API keys, tools needed)

      examples/<task-title>/CLAUDE.md
        - Project context for agents working in this repo

      ## Quality bar
      - MUST be runnable with `ao daemon start` from the example directory
      - No placeholders, no TODOs
      - All agent references in phases must match agents.yaml
      - All phase references in workflows must match phases.yaml
      - All MCP server references in agents must match mcp-servers.yaml

      Project root: /Users/samishukri/ao-examples
    capabilities:
      mutates_state: true
      writes_files: true
      requires_commit: true

  review-example:
    mode: agent
    agent: reviewer
    directive: |
      Review the generated AO example repo.

      ## How to find the example
      The task title IS the example id (e.g. "blog-generator").
      The example is at: examples/<task-title>/

      ## Review checklist

      ### Structure (read these files)
      - examples/<task-title>/.ao/workflows/agents.yaml — must exist, define agents
      - examples/<task-title>/.ao/workflows/phases.yaml — must exist, define phases
      - examples/<task-title>/.ao/workflows/workflows.yaml — must exist, define workflows
      - examples/<task-title>/.ao/workflows/mcp-servers.yaml — must exist if agents reference MCP servers
      - examples/<task-title>/README.md — must exist with quick start
      - examples/<task-title>/CLAUDE.md — must exist

      ### Correctness
      - Every agent referenced in phases.yaml exists in agents.yaml
      - Every phase referenced in workflows.yaml exists in phases.yaml
      - Every MCP server referenced in agents exists in mcp-servers.yaml
      - Model names are valid
      - on_verdict targets reference valid phase IDs

      ### Quality
      - System prompts are detailed (not boilerplate, 5+ lines)
      - At least 2 different models used
      - At least 3 AO features demonstrated
      - At least one non-linear workflow feature
      - README clearly explains the use case
      - Example solves a real problem

      Provide verdict: advance, rework (with SPECIFIC fixes needed), or fail.

      Project root: /Users/samishukri/ao-examples
    decision_contract:
      required_fields:
        - verdict
        - reasoning
    capabilities:
      mutates_state: false

  init-example-repo:
    mode: command
    directive: "Initialize the example as a standalone git repo, create remote on GitHub, and push"
    command:
      program: bash
      args:
        - "-c"
        - |
          set -e
          EXAMPLE_ID="{{subject_title}}"
          EXAMPLE_DIR="examples/${EXAMPLE_ID}"
          REPO_NAME="ao-example-${EXAMPLE_ID}"
          ORG="launchapp-dev"

          if [ ! -d "${EXAMPLE_DIR}" ]; then
            echo "ERROR: ${EXAMPLE_DIR} does not exist!"
            exit 1
          fi

          cd "${EXAMPLE_DIR}"

          # Init local git repo if needed
          if [ ! -d ".git" ]; then
            git init
            git add -A
            git commit -m "Initial AO example: ${EXAMPLE_ID}

          Generated by AO Examples — https://github.com/launchapp-dev/ao-examples
          This is a standalone AO workflow example. Run with: ao daemon start"
            echo "Initialized local git repo for ${EXAMPLE_ID}"
          else
            git add -A
            git diff --cached --quiet || git commit -m "Update AO example: ${EXAMPLE_ID}"
          fi

          # Create remote repo on GitHub if it doesn't exist
          if ! gh repo view "${ORG}/${REPO_NAME}" &>/dev/null; then
            echo "Creating public repo: ${ORG}/${REPO_NAME}"
            gh repo create "${ORG}/${REPO_NAME}" \
              --public \
              --description "AO workflow example: ${EXAMPLE_ID} — generated by ao-examples" \
              --source=. \
              --push
          else
            echo "Remote repo ${ORG}/${REPO_NAME} already exists, pushing..."
            git remote get-url origin &>/dev/null || git remote add origin "https://github.com/${ORG}/${REPO_NAME}.git"
            git push -u origin main || git push -u origin master
          fi

          echo "Done: https://github.com/${ORG}/${REPO_NAME}"
      cwd_mode: project_root
      timeout_secs: 120

  update-registry:
    mode: agent
    agent: conductor
    directive: |
      The example has been built, reviewed, and initialized as a git repo.

      ## How to find the example
      The task title IS the example id.

      ## What to do
      1. Update registry.yaml: change this example's status to "generated"
      2. Add a generated_at field with today's date
      3. Update README.md: ensure the examples table includes this example with correct info and status "generated"
      4. Commit and push changes

      Project root: /Users/samishukri/ao-examples
    capabilities:
      mutates_state: true
      writes_files: true
      requires_commit: true

  # ============================================================
  # IDEATION PIPELINE — conductor comes up with new ideas
  # ============================================================

  ideate:
    mode: agent
    agent: conductor
    directive: |
      Time to brainstorm new example ideas. This runs when the pipeline needs more work.

      ## Project context
      Project root: /Users/samishukri/ao-examples
      Registry: registry.yaml (read this first)
      300 pipeline ideas: /Users/samishukri/brain/knowledge/yc/100-pipelines.md

      ## What to do
      1. Read registry.yaml — what verticals and tools are already covered?
      2. Read the 300 pipelines file for inspiration
      3. Identify gaps — what's missing? What would be impressive?
      4. Research 3-5 new ideas. For each:
         - What vertical/use case?
         - What tools/APIs/MCP servers would it use?
         - What AO features would it demonstrate?
         - Is it feasible? (real tools, real APIs)
         - Would it make someone say "I want to try AO"?
      5. Add the best 2-3 to registry.yaml with status: "queued"
         Use the same YAML format as existing entries (id, name, vertical, description, features_demonstrated, tools_needed, status)
      6. Commit registry.yaml

      Think creatively. Some directions to explore:
      - Tool integrations: Replicate, Hugging Face, Pinecone, Weaviate, Supabase
      - API wrappers: Twitter/X, Reddit, Discord, Telegram bots
      - File processing: PDF analysis, image manipulation, video editing
      - Automation: email, calendar, project management, invoicing
      - Domain-specific: medical records, legal contracts, financial reports
      - Fun/viral: meme generator, AI art curator, music playlist creator
    capabilities:
      mutates_state: true
      writes_files: true
      requires_commit: true

  research-integration:
    mode: agent
    agent: researcher
    directive: |
      Deep-dive research on a specific tool or integration for a proposed example.

      Read the task title and description for what to investigate. Produce a research brief:
      1. Tool overview — what it does, pricing, API availability
      2. MCP server availability — does one exist? npm package name?
      3. Integration approach — how would AO use this? (MCP server, command phase, API calls)
      4. Example workflow sketch — rough phases and agents
      5. Feasibility verdict — can this work as a standalone AO example?
      6. Required setup — API keys, accounts, dependencies

      Write findings to research/<tool-name>.md
      Project root: /Users/samishukri/ao-examples
    capabilities:
      mutates_state: true
      writes_files: true
      requires_commit: true

  # ============================================================
  # MCP SERVER BUILD PIPELINE
  # ============================================================

  research-mcp:
    mode: agent
    agent: researcher
    directive: |
      Research the API/tool that needs an MCP server.

      The task title is "mcp-<tool-name>" (e.g. "mcp-replicate").
      The task description explains what API to wrap.

      Research and document:
      1. API documentation URL
      2. Authentication method (API key, OAuth, etc.)
      3. Key endpoints to wrap as MCP tools
      4. Data formats (JSON schemas for inputs/outputs)
      5. Rate limits and pricing
      6. Existing npm packages that wrap this API (we can use them internally)

      Write findings to: research/mcp-<tool-name>.md
      Project root: /Users/samishukri/ao-examples
    capabilities:
      mutates_state: true
      writes_files: true
      requires_commit: true

  build-mcp:
    mode: agent
    agent: mcp-builder
    directive: |
      Build a custom MCP server for the specified tool/API.

      The task title is "mcp-<tool-name>" (e.g. "mcp-replicate").
      Check research/mcp-<tool-name>.md for API research (if it exists).

      Create the complete MCP server package at: mcp-servers/<tool-name>/
      Example: mcp-servers/replicate/

      Required files:
      - mcp-servers/<tool-name>/package.json
      - mcp-servers/<tool-name>/tsconfig.json
      - mcp-servers/<tool-name>/src/index.ts
      - mcp-servers/<tool-name>/README.md
      - mcp-servers/<tool-name>/.env.example

      The server must be functional — wrapping real API endpoints, not stubs.

      Project root: /Users/samishukri/ao-examples
    capabilities:
      mutates_state: true
      writes_files: true
      requires_commit: true

  review-mcp:
    mode: agent
    agent: reviewer
    directive: |
      Review the custom MCP server at mcp-servers/<tool-name>/.

      The task title is "mcp-<tool-name>".

      Check:
      1. package.json has correct dependencies (@modelcontextprotocol/sdk)
      2. src/index.ts implements a real MCP server with Server + StdioServerTransport
      3. Tools have clear names, descriptions, and input schemas
      4. Tool handlers call real API endpoints (not mocked)
      5. Auth uses environment variables (not hardcoded)
      6. .env.example lists all required vars
      7. README explains setup, available tools, and how to use in AO workflows
      8. TypeScript compiles (tsconfig.json is valid)

      Verdict: advance (ships), rework (specific fixes), fail (fundamental issues).

      Project root: /Users/samishukri/ao-examples
    decision_contract:
      required_fields:
        - verdict
        - reasoning
    capabilities:
      mutates_state: false

  publish-mcp:
    mode: command
    directive: "Initialize git repo for the MCP server and create public GitHub repo"
    command:
      program: bash
      args:
        - "-c"
        - |
          set -e
          TASK_TITLE="{{subject_title}}"
          TOOL_NAME="${TASK_TITLE#mcp-}"
          MCP_DIR="mcp-servers/${TOOL_NAME}"
          REPO_NAME="mcp-${TOOL_NAME}"
          ORG="launchapp-dev"

          if [ ! -d "${MCP_DIR}" ]; then
            echo "ERROR: ${MCP_DIR} does not exist!"
            exit 1
          fi

          cd "${MCP_DIR}"

          # Install dependencies and build
          npm install 2>&1 || echo "npm install skipped (may need manual setup)"

          # Init local git repo
          if [ ! -d ".git" ]; then
            git init
            git add -A
            git commit -m "Initial MCP server: ${TOOL_NAME}

          Custom MCP server wrapping the ${TOOL_NAME} API.
          Generated by AO Examples — https://github.com/launchapp-dev/ao-examples"
          else
            git add -A
            git diff --cached --quiet || git commit -m "Update MCP server: ${TOOL_NAME}"
          fi

          # Create remote repo on GitHub
          if ! gh repo view "${ORG}/${REPO_NAME}" &>/dev/null; then
            echo "Creating public repo: ${ORG}/${REPO_NAME}"
            gh repo create "${ORG}/${REPO_NAME}" \
              --public \
              --description "MCP server for ${TOOL_NAME} — built by AO" \
              --source=. \
              --push
          else
            echo "Remote repo exists, pushing..."
            git remote get-url origin &>/dev/null || git remote add origin "https://github.com/${ORG}/${REPO_NAME}.git"
            git push -u origin main || git push -u origin master
          fi

          echo "Done: https://github.com/${ORG}/${REPO_NAME}"
      cwd_mode: project_root
      timeout_secs: 120

  # ============================================================
  # MAINTENANCE PHASES
  # ============================================================

  audit-examples:
    mode: agent
    agent: reviewer
    directive: |
      Audit all generated examples for quality and freshness.

      Project root: /Users/samishukri/ao-examples

      For each example with status: "generated" in registry.yaml:
      1. Read examples/<id>/.ao/workflows/ — is the YAML still valid?
      2. Check if README is accurate
      3. Check if better AO features exist now that should be demonstrated
      4. Flag any that need refreshing

      Update registry.yaml with audit notes for any that need attention.
    capabilities:
      mutates_state: true
      writes_files: true
      requires_commit: true

  refresh-example:
    mode: agent
    agent: master-builder
    directive: |
      Refresh an existing example to use the latest AO features and schema.

      The task title IS the example id. Files are at: examples/<task-title>/

      Read the audit notes in registry.yaml for what needs updating.
      Only change what's necessary — don't rewrite working files.
      Update the README if features or workflow changed.

      Project root: /Users/samishukri/ao-examples
    capabilities:
      mutates_state: true
      writes_files: true
      requires_commit: true
