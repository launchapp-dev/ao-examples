schedules:
  # Generate next pending example every 30 minutes
  - id: example-generator
    cron: "*/30 * * * *"
    workflow_ref: generate-all
    enabled: false

  # Refresh all examples weekly (Sunday at 6am)
  - id: example-refresher
    cron: "0 6 * * 0"
    workflow_ref: refresh-example
    enabled: false
