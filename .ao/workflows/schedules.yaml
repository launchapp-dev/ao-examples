schedules:
  # Conductor runs every 30 minutes — the brain of the operation
  # Ideates, researches, queues new examples, manages progress
  - id: conductor
    cron: "*/30 * * * *"
    workflow_ref: conductor-loop
    enabled: true

  # Weekly audit of all generated examples (Sunday 6am)
  - id: weekly-audit
    cron: "0 6 * * 0"
    workflow_ref: audit
    enabled: true
